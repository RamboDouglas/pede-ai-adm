name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Testes unitários: funções puras extraídas do index.html + validações
      # do backend (functions/helpers.js). node:test nativo, zero dependências.
      - run: node --test tests/*.test.mjs functions/*.test.mjs
