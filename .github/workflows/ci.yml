name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Testes unitários das funções puras extraídas do index.html
      # (node:test nativo — sem package.json/dependências de propósito).
      - run: node --test tests/*.test.mjs
